# agent-lanes engine configuration.
# This file describes WHAT this workspace's engine looks like (workspace metadata,
# lanes, queue location). It does NOT contain task definitions.
#
# Task definitions are separate YAML files that you create wherever your project
# organizes them (a common convention is `tasks/` at the project root). To submit
# a task, run:
#
#     ./handoff/bin/handoff submit --task tasks/<your-task>.yaml \
#       --request-from <path> --response-to <path>
#
# Or fully inline without a task file. See the agent-lanes README for examples.
#
# This file should rarely change. Add a lane when you introduce a new capability
# tier; otherwise it is set-and-forget.
#
# By default this rack owns its local queue at `handoff/state`. To run a
# workspace-level pool of dispatchers serving multiple racks, point `queue_root`
# at the same shared absolute queue path from each rack's handoff.yaml.

workspace_id: {{WORKSPACE_ID}}
workspace_root: {{WORKSPACE_ROOT}}
queue_root: {{QUEUE_ROOT}}

lanes:
  default:
    description: general-purpose lane
  # Add more lanes as you introduce capability tiers, e.g.:
  # opus-tier:
  #   description: deep reasoning, large context
  # haiku-tier:
  #   description: fast, low-effort tasks
